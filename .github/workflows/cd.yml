name: CD - Deploy

on:
  push:
    branches: ["main"]
  workflow_dispatch:
    inputs:
      environment:
        description: 'Deployment environment'
        required: true
        default: 'testnet'
        type: choice
        options:
          - testnet
          - mainnet

env:
  NODE_VERSION: "20"
  RUST_VERSION: "stable"

jobs:
  # Deploy smart contracts
  deploy-contracts:
    name: Deploy Smart Contracts
    runs-on: ubuntu-latest
    environment: ${{ github.event.inputs.environment || 'testnet' }}
    outputs:
      payment_contract_id: ${{ steps.deploy.outputs.payment_contract_id }}
      escrow_contract_id: ${{ steps.deploy.outputs.escrow_contract_id }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Cache Rust dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            contracts/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('contracts/Cargo.lock') }}

      - name: Install soroban-cli
        run: cargo install --locked soroban-cli --features opt

      - name: Build contracts
        working-directory: contracts
        run: cargo build --target wasm32-unknown-unknown --release

      - name: Deploy contracts
        id: deploy
        working-directory: contracts
        env:
          STELLAR_SECRET_KEY: ${{ secrets.STELLAR_SECRET_KEY }}
          SOROBAN_RPC_URL: ${{ secrets.SOROBAN_RPC_URL }}
          NETWORK_PASSPHRASE: ${{ secrets.NETWORK_PASSPHRASE }}
        run: |
          # Deploy payment contract
          PAYMENT_ID=$(soroban contract deploy \
            --wasm target/wasm32-unknown-unknown/release/payment.wasm \
            --source "$STELLAR_SECRET_KEY" \
            --rpc-url "$SOROBAN_RPC_URL" \
            --network-passphrase "$NETWORK_PASSPHRASE")
          
          echo "payment_contract_id=$PAYMENT_ID" >> $GITHUB_OUTPUT
          echo "✅ Payment contract deployed: $PAYMENT_ID"
          
          # Deploy escrow contract
          ESCROW_ID=$(soroban contract deploy \
            --wasm target/wasm32-unknown-unknown/release/escrow.wasm \
            --source "$STELLAR_SECRET_KEY" \
            --rpc-url "$SOROBAN_RPC_URL" \
            --network-passphrase "$NETWORK_PASSPHRASE")
          
          echo "escrow_contract_id=$ESCROW_ID" >> $GITHUB_OUTPUT
          echo "✅ Escrow contract deployed: $ESCROW_ID"

      - name: Create deployment summary
        run: |
          echo "## 🚀 Contract Deployment Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Environment:** ${{ github.event.inputs.environment || 'testnet' }}" >> $GITHUB_STEP_SUMMARY
          echo "**Payment Contract:** \`${{ steps.deploy.outputs.payment_contract_id }}\`" >> $GITHUB_STEP_SUMMARY
          echo "**Escrow Contract:** \`${{ steps.deploy.outputs.escrow_contract_id }}\`" >> $GITHUB_STEP_SUMMARY

  # Deploy frontend
  deploy-frontend:
    name: Deploy Frontend
    runs-on: ubuntu-latest
    needs: [deploy-contracts]
    environment: ${{ github.event.inputs.environment || 'testnet' }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Build frontend
        working-directory: frontend
        env:
          NEXT_PUBLIC_NETWORK_PASSPHRASE: ${{ secrets.NETWORK_PASSPHRASE }}
          NEXT_PUBLIC_HORIZON_URL: ${{ secrets.HORIZON_URL }}
          NEXT_PUBLIC_SOROBAN_RPC_URL: ${{ secrets.SOROBAN_RPC_URL }}
          NEXT_PUBLIC_PAYMENT_CONTRACT_ID: ${{ needs.deploy-contracts.outputs.payment_contract_id }}
          NEXT_PUBLIC_ESCROW_CONTRACT_ID: ${{ needs.deploy-contracts.outputs.escrow_contract_id }}
        run: npm run build

      - name: Deploy to Vercel
        if: secrets.VERCEL_TOKEN != ''
        working-directory: frontend
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
        run: |
          npm install -g vercel
          vercel deploy --prod --token=$VERCEL_TOKEN

      - name: Create deployment summary
        run: |
          echo "## 🌐 Frontend Deployment Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Status:** ✅ Deployed successfully" >> $GITHUB_STEP_SUMMARY
          echo "**Environment:** ${{ github.event.inputs.environment || 'testnet' }}" >> $GITHUB_STEP_SUMMARY

  # Notify deployment
  notify:
    name: Notify Deployment
    runs-on: ubuntu-latest
    needs: [deploy-contracts, deploy-frontend]
    if: always()
    steps:
      - name: Send notification
        run: |
          echo "Deployment completed!"
          echo "Payment Contract: ${{ needs.deploy-contracts.outputs.payment_contract_id }}"
          echo "Escrow Contract: ${{ needs.deploy-contracts.outputs.escrow_contract_id }}"
