name: Performance Testing

on:
  pull_request:
    branches: ["main"]
  schedule:
    # Run every day at 2 AM UTC
    - cron: '0 2 * * *'
  workflow_dispatch:

jobs:
  # Load testing
  load-test:
    name: Load Testing
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Build application
        working-directory: frontend
        run: npm run build
        env:
          NEXT_PUBLIC_NETWORK_PASSPHRASE: "Test SDF Network ; September 2015"
          NEXT_PUBLIC_HORIZON_URL: "https://horizon-testnet.stellar.org"
          NEXT_PUBLIC_SOROBAN_RPC_URL: "https://soroban-testnet.stellar.org"

      - name: Start application
        working-directory: frontend
        run: |
          npm start &
          sleep 10
        env:
          PORT: 3000

      - name: Install k6
        run: |
          sudo gpg -k
          sudo gpg --no-default-keyring --keyring /usr/share/keyrings/k6-archive-keyring.gpg --keyserver hkp://keyserver.ubuntu.com:80 --recv-keys C5AD17C747E3415A3642D57D77C6C491D6AC1D69
          echo "deb [signed-by=/usr/share/keyrings/k6-archive-keyring.gpg] https://dl.k6.io/deb stable main" | sudo tee /etc/apt/sources.list.d/k6.list
          sudo apt-get update
          sudo apt-get install k6

      - name: Run load tests
        run: |
          cat > load-test.js << 'EOF'
          import http from 'k6/http';
          import { check, sleep } from 'k6';
          
          export const options = {
            stages: [
              { duration: '30s', target: 10 },
              { duration: '1m', target: 50 },
              { duration: '30s', target: 0 },
            ],
            thresholds: {
              http_req_duration: ['p(95)<500'],
              http_req_failed: ['rate<0.1'],
            },
          };
          
          export default function () {
            const res = http.get('http://localhost:3000');
            check(res, {
              'status is 200': (r) => r.status === 200,
              'response time < 500ms': (r) => r.timings.duration < 500,
            });
            sleep(1);
          }
          EOF
          
          k6 run load-test.js --out json=load-test-results.json || true

      - name: Generate performance report
        run: |
          echo "## ⚡ Load Test Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Load testing completed. Check artifacts for detailed results." >> $GITHUB_STEP_SUMMARY

      - name: Upload results
        uses: actions/upload-artifact@v4
        with:
          name: load-test-results
          path: load-test-results.json
          retention-days: 30

  # Contract performance
  contract-benchmarks:
    name: Contract Benchmarks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Run benchmarks
        working-directory: contracts
        run: |
          cargo bench --no-run || echo "No benchmarks configured"
          echo "## 🏎️ Contract Benchmarks" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Contract performance benchmarks completed." >> $GITHUB_STEP_SUMMARY

  # Frontend performance
  frontend-performance:
    name: Frontend Performance
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Build application
        working-directory: frontend
        run: npm run build
        env:
          NEXT_PUBLIC_NETWORK_PASSPHRASE: "Test SDF Network ; September 2015"
          NEXT_PUBLIC_HORIZON_URL: "https://horizon-testnet.stellar.org"
          NEXT_PUBLIC_SOROBAN_RPC_URL: "https://soroban-testnet.stellar.org"

      - name: Analyze build
        working-directory: frontend
        run: |
          echo "## 📊 Build Analysis" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Bundle Sizes" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          find .next -name "*.js" -type f -exec du -h {} + | sort -rh | head -20 >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY

      - name: Check bundle size limits
        working-directory: frontend
        run: |
          TOTAL_SIZE=$(du -sb .next | cut -f1)
          MAX_SIZE=$((50 * 1024 * 1024)) # 50MB
          
          if [ $TOTAL_SIZE -gt $MAX_SIZE ]; then
            echo "⚠️ Bundle size exceeds limit: $(($TOTAL_SIZE / 1024 / 1024))MB > 50MB"
            exit 1
          else
            echo "✅ Bundle size within limits: $(($TOTAL_SIZE / 1024 / 1024))MB"
          fi
